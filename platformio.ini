[platformio]
default_envs = car

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = dio
upload_protocol = esptool
upload_flags =
    --before=usb_reset
    --after=hard_reset

[env:car]
build_flags = -DBUILD_CAR

[env:remote]
build_flags = -DBUILD_REMOTE
